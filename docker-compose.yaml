services:
  frontend:
    build:
      context: ./frontend
      dockerfile: config/docker/Dockerfile
      args:
        VITE_API_URL: ${API_BASEURL:-http://localhost:8080/}
    restart: always
    environment:
      - VITE_API_URL=${API_BASEURL:-http://localhost:8080/}
    ports:
      - "80:80"
    volumes:
      - ./frontend/public:/usr/share/caddy/public:ro
    depends_on:
      backend:
        condition: service_started

  postgres:
    image: postgres:17.2
    ports:
      - "${PG_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${PG_NAME:-postgres}
      POSTGRES_USER: ${PG_USER:-root}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-1234}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h postgres -p 5432" ]
      interval: 3s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: ./deploy/Dockerfile
    env_file:
      - ./.env
    ports:
      - "${SERVICE_PORT:-8080}:${SERVICE_PORT:-8080}"
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      PG_USER: ${PG_USER:-root}
      PG_PASSWORD: ${PG_PASSWORD:-1234}
      PG_NAME: ${PG_NAME:-postgres}
      PG_TIMEOUT: ${PG_TIMEOUT:-1s}
      PG_MAX_POOL: ${PG_MAX_POOL:-10}
      CONN_ATTEMPTS: ${CONN_ATTEMPTS:-10}
      SERVICE_HOST: ${SERVICE_HOST:-0.0.0.0}
      SERVICE_PORT: ${SERVICE_PORT:-8080}

    volumes:
      - ${PATH_TO_PG:-../data/postgres}:/var/lib/postgresql/data

    depends_on:
      postgres:
        condition: service_healthy